<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRP Final Validator: Nested Delay</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .console { background: #111; border: 1px solid #0f0; padding: 10px; text-align: left; height: 250px; overflow-y: auto; font-size: 12px; margin-top: 20px; }
        button { width: 100%; padding: 20px; background: #222; color: #0f0; border: 2px solid #0f0; cursor: pointer; font-weight: bold; }
        .timer { font-size: 30px; color: yellow; margin: 10px; }
        .success { color: #0f0; font-weight: bold; background: #003300; }
        .fail { color: #f00; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🔬 NESTED DELAY TEST (3.5s)</h2>
    <div class="timer" id="timer">0.000s</div>
    <button onclick="runNestedTest()">START NESTED TEST (2s + 1.5s)</button>

    <div class="console" id="logBox">> Waiting for command...</div>

    <script>
        const logBox = document.getElementById('logBox');
        const timer = document.getElementById('timer');

        function print(msg, cls='') {
            const d = document.createElement('div');
            d.className = cls;
            d.innerHTML = `[${performance.now().toFixed(0)}ms] > ${msg}`;
            logBox.appendChild(d);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function runNestedTest() {
            logBox.innerHTML = '';
            print("Memicu Alert...");
            alert("Klik OK. Fullscreen akan dipanggil lewat NESTED timeout (Total 3.5s).");
            
            const T0 = performance.now();
            
            // Timer visual
            const intv = setInterval(() => {
                timer.innerText = ((performance.now() - T0)/1000).toFixed(3) + "s";
            }, 50);

            print("Step 1: Menunggu 2000ms pertama...");
            
            // DELAY PERTAMA (2 Detik)
            setTimeout(() => {
                print("Step 1 SELESAI. Menjadwalkan Fullscreen SEKARANG (Nested)...");

                // DELAY KEDUA (1.5 Detik) - Task ini baru dibuat di sini!
                setTimeout(async () => {
                    const T_CALL = performance.now();
                    const diff = (T_CALL - T0).toFixed(2);
                    print(`<b>REAL CALL at ${diff}ms</b>`, 'info');

                    try {
                        await document.documentElement.requestFullscreen();
                        print(`🔥 SUCCESS! Activation LEAK confirmed at ${diff}ms`, 'success');
                        clearInterval(intv);
                        alert("BOOM! Nested Test SUCCESS!");
                    } catch (err) {
                        print(`❌ BLOCKED at ${diff}ms`, 'fail');
                        print(`Reason: ${err.message}`, 'fail');
                        clearInterval(intv);
                    }
                }, 1500);

            }, 2000);
        }
    </script>
</body>
</html>
