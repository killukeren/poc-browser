<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRP Research: Activation Leak Lab</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.4; overflow: hidden; transition: background 0.1s; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .console { background: #000; border: 1px solid #00ff41; padding: 15px; text-align: left; height: 300px; overflow-y: auto; font-size: 11px; margin-top: 20px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,65,0.2); white-space: pre-wrap; word-break: break-all; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; background: #111; color: #00ff41; border: 1px solid #00ff41; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { background: #00ff41; color: #000; }
        .success { color: #00ff41; font-weight: bold; }
        .fail { color: #ff3e3e; }
        .info { color: #00bfff; }
        .timer-big { font-size: 32px; color: #ffff00; margin: 15px 0; font-weight: bold; }
        
        /* Animasi Pas Berhasil */
        @keyframes blink { 0% { background: #000; } 50% { background: #ff0000; } 100% { background: #000; } }
        .hacked-mode { animation: blink 0.2s infinite; color: white !important; }
    </style>
</head>
<body>

<div class="container" id="mainUI">
    <h2 id="title">[VRP] SWEEP TESTER</h2>
    <div class="timer-big" id="timerDisplay">0.000s</div>

    <div class="controls">
        <button onclick="runSweep(2500)">TEST 2.5s</button>
        <button onclick="runSweep(2800)">TEST 2.8s</button>
        <button onclick="runSweep(3000)">TEST 3.0s</button>
        <button onclick="runSweep(3500)">TEST 3.5s</button>
    </div>

    <div class="console" id="logBox">> System Ready. Waiting...</div>
</div>

<script>
    const logBox = document.getElementById('logBox');
    const timerDisplay = document.getElementById('timerDisplay');
    const body = document.body;

    function print(msg, cls='') {
        const div = document.createElement('div');
        div.className = cls;
        div.innerHTML = `> ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function runSweep(targetMs) {
        logBox.innerHTML = '';
        body.classList.remove('hacked-mode');
        print(`Initiating Test: ${targetMs}ms`, 'info');
        
        // 1. Trigger User Activation
        alert(`UJI NYALI: ${targetMs/1000}s\n\nKlik OK & JANGAN SENTUH HP!`);
        
        const T0 = performance.now();
        print("Alert Dismissed. Timer Running...", "success");

        const timerInterval = setInterval(() => {
            const elapsed = performance.now() - T0;
            timerDisplay.innerText = (elapsed / 1000).toFixed(3) + "s";
            if (elapsed >= targetMs + 500) clearInterval(timerInterval);
        }, 16);

        // 2. The Delayed Execution
        setTimeout(async () => {
            const T_CALL = performance.now();
            const diffCall = (T_CALL - T0).toFixed(2);
            
            print(`<b>EXEC CALL at ${diffCall}ms</b>`, 'info');

            try {
                // Mencoba Fullscreen
                await document.documentElement.requestFullscreen();
                
                // JIKA BERHASIL (RESOLVED)
                const T_RES = performance.now();
                print(`🔥 SUCCESS at ${(T_RES - T0).toFixed(2)}ms`, 'success');
                
                // Visual & Haptic Feedback
                body.classList.add('hacked-mode');
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                
                document.getElementById('mainUI').innerHTML = `
                    <h1 style="font-size:40px;">BYPASS SUCCESS!</h1>
                    <p>Triggered at: ${diffCall}ms</p>
                    <button onclick="location.reload()" style="background:white; color:black;">RELOAD</button>
                `;

            } catch (err) {
                // JIKA DIBLOKIR (REJECTED)
                const T_ERR = performance.now();
                print(`❌ BLOCKED at ${(T_ERR - T0).toFixed(2)}ms`, 'fail');
                print(`Error: ${err.message}`, 'fail');
            }
        }, targetMs);
    }
</script>

</body>
</html>
