<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Trap Research</title>
    <style>
        body { 
            margin: 0; padding: 0; background: black; color: white; 
            font-family: sans-serif; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; overflow: hidden;
        }
        .fake-ui {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: #202124; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #3c4043;
            box-sizing: border-box; color: #e8eaed; font-size: 0.9rem;
        }
        .btn-lock {
            background: #4285f4; color: white; padding: 20px 40px;
            border: none; border-radius: 50px; font-weight: bold;
            font-size: 1.2rem; cursor: pointer; z-index: 10;
        }
        #status { margin-top: 20px; color: #fbbc04; }
    </style>
</head>
<body>

    <div class="fake-ui" id="fakeBar" style="display: none;">
        <span style="margin-right: 10px;">🔒</span> google.com/secure-login
    </div>

    <button class="btn-lock" onclick="toggleTrap()">
        AKTIFKAN SECURE MODE
    </button>

    <div id="status">Status: Unlocked</div>

    <script>
        let trapActive = false;

        function toggleTrap() {
            trapActive = true;
            document.getElementById('status').innerText = "Status: TRAPPED!";
            document.getElementById('fakeBar').style.display = "flex";
            launchFullscreen();
        }

        function launchFullscreen() {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            }
        }

        // KUNCI TRAP: Re-lock saat user mencoba keluar
        document.addEventListener('fullscreenchange', (event) => {
            if (!document.fullscreenElement && trapActive) {
                console.log("[!] User tried to escape! Re-locking...");
                // Memberikan sedikit delay agar tidak langsung terblokir browser
                setTimeout(() => {
                    launchFullscreen();
                }, 100); 
            }
        });

        // POINTER LOCK (Opsional, lebih kerasa di Desktop/Chrome OS)
        document.addEventListener('click', () => {
            if (trapActive) {
                document.body.requestPointerLock = document.body.requestPointerLock || 
                                                 document.body.webkitRequestPointerLock;
                document.body.requestPointerLock();
            }
        });
    </script>
</body>
</html>
