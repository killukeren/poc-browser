<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision VRP Validator</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .log { background: #111; border: 1px solid #333; padding: 10px; height: 300px; overflow-y: auto; font-size: 12px; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; margin-bottom: 5px; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; }
        .info { color: #55f; }
    </style>
</head>
<body>

    <h3>🔬 Activation Validator</h3>
    
    <button onclick="runStrictTest(2100)">TEST 2.1s</button>
    <button onclick="runStrictTest(2500)">TEST 2.5s</button>
    <button onclick="runStrictTest(3000)">TEST 3.0s</button>

    <div class="log" id="logBox"></div>

    <script>
        const logBox = document.getElementById('logBox');
        function print(msg, cls='') {
            const d = document.createElement('div');
            d.className = cls;
            d.innerHTML = `[${performance.now().toFixed(0)}ms] ${msg}`;
            logBox.appendChild(d);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function runStrictTest(delay) {
            print(`--- Memicu Alert (${delay}ms) ---`, 'info');
            alert("Klik OK dan JANGAN SENTUH HP.");
            
            const T0 = performance.now();
            print("Alert CLOSED. Tracking started...");

            setTimeout(() => {
                const T_CALL = performance.now();
                const diffCall = (T_CALL - T0).toFixed(2);
                
                print(`ACTION: Calling requestFullscreen() at <b>${diffCall}ms</b>`, 'info');

                document.documentElement.requestFullscreen()
                    .then(() => {
                        const T_RESOLVE = performance.now();
                        const diffResolve = (T_RESOLVE - T0).toFixed(2);
                        print(`✅ SUCCESS: Resolved at <b>${diffResolve}ms</b>`, 'success');
                        
                        if (diffCall > 2100) {
                            alert(`BINGO! Call at ${diffCall}ms was accepted!`);
                        }
                    })
                    .catch((err) => {
                        const T_BLOCK = performance.now();
                        const diffBlock = (T_BLOCK - T0).toFixed(2);
                        print(`❌ BLOCKED: at ${diffBlock}ms`, 'fail');
                    });

            }, delay);
        }
    </script>
</body>
</html>
