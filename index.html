<!DOCTYPE html>
<html>
<head>
    <title>Chromium VRP: Extended Activation Window Test</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff00; padding: 20px; }
        #console { border: 1px solid #333; padding: 15px; height: 350px; overflow-y: auto; background: #000; }
        #timer-box { font-size: 54px; font-weight: bold; color: #39ff14; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        button { background: #39ff14; color: #000; border: none; padding: 20px 40px; cursor: pointer; font-weight: bold; font-size: 20px; border-radius: 8px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; }
        .success-text { color: #00ffff; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <h2>[RESEARCH] User Activation Lifetime Study</h2>
    <div id="timer-box">00:00:000</div>
    <div id="console"></div><br>
    <button id="start">START TEST (USER GESTURE)</button>

    <script>
        const btn = document.getElementById('start');
        const con = document.getElementById('console');
        const timerBox = document.getElementById('timer-box');
        const T0 = () => performance.now();
        let startTime;
        let timerInterval;

        function log(msg) {
            const ts = (T0() - startTime).toFixed(0);
            con.innerHTML += `<div class="log-entry">[${ts}ms] ${msg}</div>`;
            con.scrollTop = con.scrollHeight;
        }

        function updateTimer() {
            const now = T0() - startTime;
            const ms = Math.floor(now % 1000).toString().padStart(3, '0');
            const sec = Math.floor((now / 1000) % 60).toString().padStart(2, '0');
            const min = Math.floor(now / 60000).toString().padStart(2, '0');
            timerBox.innerText = `${min}:${sec}:${ms}`;
        }

        const stages = [4800]; 

        function executeStage(index) {
            if (index >= stages.length) {
                const callTimestamp = (T0() - startTime).toFixed(0);
                log(`<b>FINAL STAGE REACHED</b>`);
                log(`<b>CALLING requestFullscreen() at ${callTimestamp}ms</b>`);
                
                document.documentElement.requestFullscreen()
                    .then(() => {
                        const successTimestamp = (T0() - startTime).toFixed(0);
                        log(`<span class="success-text">SUCCESS: Fullscreen granted at ${successTimestamp}ms</span>`);
                        clearInterval(timerInterval);
                    })
                    .catch(e => {
                        const failTimestamp = (T0() - startTime).toFixed(0);
                        log(`<span style='color:red'>EXPIRED: ${e.message} at ${failTimestamp}ms</span>`);
                        clearInterval(timerInterval);
                    });
                return;
            }

            log(`Nesting task: ${stages[index]}ms delay...`);
            setTimeout(() => {
                executeStage(index + 1);
            }, stages[index]);
        }

        btn.onclick = () => {
            startTime = T0();
            btn.style.display = 'none';
            log("User activation captured. Starting async chain.");
            
            timerInterval = setInterval(updateTimer, 10);
            executeStage(0);
        };
    </script>
</body>
</html>
